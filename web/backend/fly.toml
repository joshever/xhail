# fly.toml — XHAIL API on Fly.io
# Deploy with: fly deploy --dockerfile web/backend/Dockerfile
# (run from repo root)

app = "xhail-api"
primary_region = "lhr"

[build]
  dockerfile = "web/backend/Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

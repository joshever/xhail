# ============================================================
# XHAIL — Continuous Integration
# ============================================================
# Jobs:
#   lint     — ruff check + mypy type-check (fast, no clingo needed)
#   test     — pytest unit + integration, coverage upload (3 × Python)
#   benchmark — full 10-benchmark smoke-test (3.11 only, fast guard)
# ============================================================

name: CI

on:
  push:
    branches: ["main", "master", "dev"]
  pull_request:
    branches: ["main", "master"]

# Cancel in-flight runs for the same ref so a force-push doesn't waste minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------
  # Job 1: Lint + type-check (Python 3.11 only — fast feedback)
  # ----------------------------------------------------------
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff — lint
        run: python -m ruff check .

      - name: Ruff — format check
        run: python -m ruff format --check .

      - name: mypy — type-check
        run: python -m mypy xhail/ --ignore-missing-imports

  # ----------------------------------------------------------
  # Job 2: Unit + integration tests (Python 3.10, 3.11, 3.12)
  # ----------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint                        # only run if lint passes
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Unit tests
        run: |
          python -m pytest tests/ -m "not integration" \
            --cov=xhail \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Integration tests
        run: python -m pytest tests/ -m integration -v

      - name: Upload coverage to Codecov
        # Upload from one matrix leg to avoid duplicate reports.
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ----------------------------------------------------------
  # Job 3: Benchmark smoke-test (Python 3.11, 10/10 must pass)
  # ----------------------------------------------------------
  benchmark:
    name: Benchmark smoke-test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run full benchmark suite
        run: |
          python experiments/run_benchmarks.py 2>&1 | tee benchmark_output.txt
          # Fail CI if any benchmark does not solve
          if grep -q "NO HYP\|ERROR\| 0/" benchmark_output.txt; then
            echo "::error::One or more benchmarks failed — see output above."
            exit 1
          fi
          # Assert all 10 pass
          if ! grep -q "10/10 benchmarks solved" benchmark_output.txt; then
            echo "::error::Not all benchmarks solved."
            exit 1
          fi

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark_output.txt
            experiments/results/
          retention-days: 30
